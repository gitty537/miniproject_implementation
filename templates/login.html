<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — PPE Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d10;
    --surface: #16161c;
    --surface2: #1e1e26;
    --border: #2a2a36;
    --text: #e2e2ec;
    --muted: #6b6b82;
    --accent: #00c896;
    --accent-hover: #00e5ac;
    --danger: #ff4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0, 200, 150, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(68, 136, 255, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255, 68, 68, 0.03) 0%, transparent 50%);
    animation: bgShift 12s ease-in-out infinite alternate;
    z-index: -1;
  }
  @keyframes bgShift {
    0%   { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.1) translate(-2%, 3%); }
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    animation: cardIn 0.5s ease-out;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #0088ff);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(0, 200, 150, 0.25);
  }
  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .logo h1 span { color: var(--accent); }
  .logo p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 200, 150, 0.1);
  }
  .form-group input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover {
    background: var(--accent-hover);
    box-shadow: 0 4px 16px rgba(0, 200, 150, 0.3);
    transform: translateY(-1px);
  }
  .btn-login:active { transform: scale(0.98); }

  .error-msg {
    background: rgba(255, 68, 68, 0.1);
    border: 1px solid rgba(255, 68, 68, 0.3);
    color: var(--danger);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 18px;
    display: none;
    animation: shake 0.4s ease;
  }
  .error-msg.show { display: block; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .footer-link {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--muted);
  }
  .footer-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <h1>PPE Detection <span>System</span></h1>
    <p>Sign in to access the dashboard</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <form id="login-form" method="POST" action="/login">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>

  <div class="footer-link">
    Don't have an account? <a href="/signup">Create one</a>
  </div>
</div>

<script>
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/';
      } else {
        errEl.textContent = data.detail || 'Invalid credentials';
        errEl.classList.add('show');
      }
    } catch (err) {
      errEl.textContent = 'Connection error. Please try again.';
      errEl.classList.add('show');
    }
  });

  // Show error from URL params (e.g. ?error=...)
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    const errEl = document.getElementById('error-msg');
    errEl.textContent = params.get('error');
    errEl.classList.add('show');
  }
</script>
</body>
</html>
